name: Build CaptureSample IPA
on: 
  workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Build Unsigned iOS Application
        run: |
          xcodebuild clean build \
            -project CaptureSample.xcodeproj \
            -scheme CaptureSample \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=$(PWD)/build
          
          mkdir Payload
          mv build/Release-iphoneos/CaptureSample.app Payload/
          zip -r CaptureSample.ipa Payload
      
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaptureSample-App
          path: CaptureSample.ipa
